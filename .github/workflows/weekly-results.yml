# Moravian Gators – týdenní výsledky
# Každé pondělí v 6:00 UTC = 8:00 CEST (7:00 CET v zimě)
#
# POZN.: GitHub Actions používá UTC. Střední Evropa je UTC+2 v létě (CEST)
# a UTC+1 v zimě (CET). Cron `0 6 * * 1` = 8:00 CEST / 7:00 CET.
# Pokud chceš přesně 8:00 i v zimě, musel bys mít dva cron joby
# a přepínat je, ale 7:00 vs 8:00 v zimě je přijatelný kompromis.

name: Weekly Results

on:
  schedule:
    # Každé pondělí v 6:00 UTC (= 8:00 CEST letní čas)
    - cron: "0 6 * * 1"
  workflow_dispatch:
    # Ruční spuštění z GitHub webu (pro testování)
    inputs:
      date:
        description: "Datum soboty víkendu (YYYY-MM-DD), prázdné = minulý víkend"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  send-results:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python main.py --date "${{ github.event.inputs.date }}"
          else
            python main.py
          fi

      - name: Commit cumulative data
        run: |
          git config user.name "Gators Bot"
          git config user.email "bot@moraviangators.cz"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: update results $(date +%Y-%m-%d)"
            git push
          fi

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ github.run_id }}
          path: output/
          retention-days: 30
